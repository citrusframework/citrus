name: "CamelCliTest"
author: "Christoph"
status: "FINAL"
actions:
  - camel:
      cli:
        run:
          args:
            - "--verbose"
          integration:
            name: "hello-yaml"
            file: "classpath:org/citrusframework/camel/integration/route.yaml"
            systemProperties:
              properties:
                - name: greeting
                  value: Hello Camel
  - camel:
      cli:
        verify:
          integration: "hello-yaml"
          logMessage: "HELLO CAMEL #10"
finally:
  - camel:
      cli:
        stop:
          integration: "hello-yaml"
