#
# The logging properties used
# Extra logging related to initialization of Log4j
# Set to debug or trace if log4j initialization is failing
status = warn

# Console appender configuration
appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
# logging style that is similar to spring boot
appender.console.layout.pattern = %style{%d{yyyy-MM-dd HH:mm:ss.SSS}}{Dim} %highlight{%5p} %style{%pid}{Magenta} %style{---}{Dim} %style{[%15.15t]}{Dim} %style{%-35.35c}{Cyan} %style{:}{Dim} %m%n

# Root logger level
rootLogger = INFO, STDOUT

# Citrus classes
logger.citrus.name = org.citrusframework
logger.citrus.level = INFO
logger.citrus.appenderRef.stdout.ref = STDOUT
logger.citrus.additivity = false

# Message loggers
logger.messageIn.name = Logger.Message_IN
logger.messageIn.level = DEBUG
logger.messageIn.appenderRef.stdout.ref = STDOUT
logger.messageIn.additivity = false

logger.messageOut.name = Logger.Message_OUT
logger.messageOut.level = DEBUG
logger.messageOut.appenderRef.stdout.ref = STDOUT
logger.messageOut.additivity = false

# Third-party loggers
logger.spring.name = org.springframework
logger.spring.level = WARN
logger.spring.appenderRef.stdout.ref = STDOUT
logger.spring.additivity = false

logger.eclipse.name = org.eclipse
logger.eclipse.level = WARN
logger.eclipse.appenderRef.stdout.ref = STDOUT
logger.eclipse.additivity = false

logger.apache.name = org.apache
logger.apache.level = WARN
logger.apache.appenderRef.stdout.ref = STDOUT
logger.apache.additivity = false
